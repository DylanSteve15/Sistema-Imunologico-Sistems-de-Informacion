<!DOCTYPE html>
<html>
<head>
    <title>Memoria Inmunológica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Memoria Inmunológica</span>
        <div>
            <a href="/" class="btn btn-outline-light">Inicio</a>
            <a href="/alertas" class="btn btn-outline-danger">Alertas</a>
            <a href="/tablas" class="btn btn-outline-warning">Tablas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Historial de Anomalías</h2>

    <table class="table table-info table-striped table-hover shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tipo de Anomalía</th>
                <th>Frecuencia</th>
                <th>Última Ocurrencia</th>
            </tr>
        </thead>

        <tbody>
        {% for m in memoria %}
            <tr>
                <td>{{m[0]}}</td>
                <td>{{m[1]}}</td>
                <td class="fw-bold text-primary">{{m[2]}}</td>
                <td>{{m[3]}}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <!-- BOTÓN VOLVER -->
    <a href="/" class="btn btn-primary mt-3">⬅ Volver al inicio</a>

</div>

</body>
</html>
