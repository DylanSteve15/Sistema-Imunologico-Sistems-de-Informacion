<!DOCTYPE html>
<html>
<head>
    <title>Tablas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>Tablas de la Base de Datos</h2>

    <table class="table table-bordered table-hover mt-3 text-center">

        <tr class="table-dark">
            <th>Tabla</th>
            <th>Acciones</th>
        </tr>

        {% for t in tablas %}
        <tr>

            <!-- Nombre -->
            <td>{{t[0]}}</td>

            <!-- Botones -->
            <td>

                <!-- VER DATOS -->
                <a href="/tabla/{{t[0]}}" class="btn btn-primary btn-sm">Ver</a>

                <!-- INSERTAR -->
                <a href="/formulario/{{t[0]}}" class="btn btn-success btn-sm">Insertar</a>

            </td>

        </tr>
        {% endfor %}

    </table>

    <a href="/" class="btn btn-secondary">⬅ Volver</a>

</div>

</body>
</html>
