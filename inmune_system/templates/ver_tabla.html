<!DOCTYPE html>
<html>
<head>
    <title>Tabla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>Tabla: {{nombre}}</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                {% for col in columnas %}
                    <th>{{col[0]}}</th>
                {% endfor %}
            </tr>
        </thead>

        <tbody>
            {% for fila in datos %}
            <tr>
                {% for dato in fila %}
                    <td>{{dato}}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>

    </table>

    <a href="/tablas" class="btn btn-primary">⬅ Volver</a>

</div>

</body>
</html>
