<!DOCTYPE html>
<html>
<head>
    <title>Alertas Inmunológicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Alertas del Sistema</span>
        <div>
            <a href="/" class="btn btn-outline-light">Inicio</a>
            <a href="/memoria" class="btn btn-outline-info">Memoria</a>
            <a href="/tablas" class="btn btn-outline-warning">Tablas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Alertas Inmunológicas</h2>

    <table class="table table-striped table-hover shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tabla</th>
                <th>Tipo</th>
                <th>Descripción</th>
                <th>Fecha</th>
                <th>Severidad</th>
            </tr>
        </thead>

        <tbody>
        {% for a in alertas %}
            <tr>
                <td>{{a[0]}}</td>
                <td>{{a[1]}}</td>
                <td>{{a[2]}}</td>
                <td>{{a[3]}}</td>
                <td>{{a[4]}}</td>
                <td class="fw-bold text-danger">{{a[5]}}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <!-- BOTÓN VOLVER -->
    <a href="/" class="btn btn-primary mt-3">⬅ Volver al inicio</a>

</div>

</body>
</html>
